  <rect x="542" y="8" width="10" height="10" rx="2" fill="#3987e5"/>
  <text x="556" y="16" class="axis">hot water (ACC)</text>
  <circle cx="647" cy="13" r="4" fill="#0d1117" stroke-width="2" stroke="#8b949e"/>
  <text x="656" y="16" class="axis">provisional</text>
  <text x="40" y="212" class="title">Share of posted restore estimates met on time</text>
