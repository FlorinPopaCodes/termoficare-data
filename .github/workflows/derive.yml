name: Derive

# Full deterministic regeneration of data/derived/ and the episode heatmap SVGs (images/)
# from the foundation CSVs, once a day. Commits only when the regenerated bytes actually
# changed. The same script runs locally via `deno task derive`; this workflow is just that
# on a schedule.
on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: derive
  cancel-in-progress: false

jobs:
  derive:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
          cache: true

      - name: Derive datasets
        run: deno task derive

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/derived images
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "Derive: regenerate derived datasets"
            # Flat pushes every 15 minutes; rebase absorbs that race.
            git pull --rebase origin main
            git push origin main
          fi
